<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline – Intelligent Backlogs Analyzer</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0f172a;
        color: #e2e8f0;
        text-align: center;
        padding: 2rem;
      }
      .container { max-width: 420px; }
      .icon {
        width: 80px;
        height: 80px;
        margin: 0 auto 1.5rem;
        background: linear-gradient(135deg, #06b6d4, #3b82f6);
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.5rem;
      }
      h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.75rem; color: #f8fafc; }
      p { font-size: 1rem; line-height: 1.6; color: #94a3b8; margin-bottom: 2rem; }
      button {
        background: linear-gradient(135deg, #06b6d4, #3b82f6);
        color: #fff;
        border: none;
        padding: 0.75rem 2rem;
        border-radius: 9999px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s;
      }
      button:hover { opacity: 0.85; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">📡</div>
      <h1>You're Offline</h1>
      <p>
        It looks like you've lost your internet connection.<br />
        Check your connection and try again.
      </p>
      <button onclick="window.location.reload()">Try Again</button>
    </div>
  </body>
</html>
